<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

  .kerno-loop-demo {
    width: 100%; height: 360px;
    margin: 0 auto; padding: 0; box-sizing: border-box;
    background: #151515;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
    display: flex;
    flex-direction: column;
  }
  .kerno-loop-demo * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Main diagram area ── */
  .loop-stage {
    padding: 28px 24px 16px;
    position: relative;
  }

  /* ── Steps row ── */
  .steps-row {
    display: flex;
    align-items: flex-start;
  }

  /* ── Connector arrows between boxes ── */
  .step-arrow {
    flex-shrink: 0;
    width: 20px;
    display: flex;
    align-items: flex-start;
    padding-top: 30px;
    justify-content: center;
    color: #2a4550;
    font-size: 13px;
    user-select: none;
  }

  /* ── Individual step wrapper ── */
  .step {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: #2a4550;
    text-transform: uppercase;
    padding-bottom: 4px;
    white-space: nowrap;
    transition: color .3s;
  }
  .step.active .step-label { color: #ff00db; }
  .step.done .step-label { color: #3a5a60; }
  .step.skipped .step-label { color: #2a3d48; }
  .step.skipped .step-card { border-color: rgba(255,255,255,.03); background: rgba(255,255,255,.008); height: 240px; }
  .step.skipped .step-preview { color: #2a3d48; }
  .step.skipped .step-preview-dot { background: #2a3d48; }
  .skip-msg { font-size: 11px; color: #2a3d48; font-style: italic; padding: 4px 0; }

  /* ── Step card ── */
  .step-card {
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 7px;
    overflow: hidden;
    background: rgba(255,255,255,.018);
    position: relative;
    height: 38px;
    transition: height .4s cubic-bezier(.4,0,.2,1),
                border-color .3s,
                box-shadow .3s;
  }
  .step.active .step-card {
    border-color: #ff00db;
    box-shadow: 0 0 18px rgba(255,0,219,.18), 0 0 0 1px rgba(255,0,219,.12);
    height: 240px;
  }
  .step.done .step-card {
    border-color: rgba(255,255,255,.06);
    height: 240px;
  }

  /* ── Collapsed preview (always visible) ── */
  .step-preview {
    padding: 10px 12px;
    font-size: 11px;
    color: #3a5a60;
    line-height: 1.4;
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color .3s;
  }
  .step.active .step-preview { color: #5a8090; }
  .step-preview-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #2a4550;
    flex-shrink: 0;
    transition: background .3s;
  }
  .step.active .step-preview-dot { background: #ff00db; }
  .step.validating .step-preview-dot {
    background: #ff00db;
    animation: pulse-dot 1s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1);   opacity: 1;   }
    50%       { transform: scale(1.9); opacity: 0.5; }
  }
  .step.done-ok .step-preview-dot { background: #48b86c; }
  .step.done-warn .step-preview-dot { background: #ff00db; }
  .step.done-err .step-preview-dot { background: #f47067; }

  /* ── Expanded content area ── */
  .step-body-inner {
    padding: 0 12px 12px;
    overflow: hidden;
  }

  /* Separator inside card */
  .card-sep {
    height: 1px;
    background: rgba(255,255,255,.05);
    margin: 0 0 10px;
  }

  /* ── Code diff block ── */
  .diff-block {
    font-size: 11px;
    line-height: 1.7;
    color: #4a6070;
  }
  .diff-block .ln-num { color: #2a3d48; margin-right: 8px; min-width: 16px; display: inline-block; }
  .diff-block .ln-add { color: #48b86c; }
  .diff-block .ln-rem { color: #f47067; }
  .diff-block .ln-ctx { color: #4a6070; }
  .diff-block .diff-stat { color: #3a5060; margin-top: 8px; font-size: 10px; }
  .diff-block .diff-stat .staged { color: #1ca8ff; }

  /* ── Validation header ── */
  .val-header {
    font-size: 10px;
    color: #3a5a60;
    letter-spacing: .5px;
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity .2s;
  }
  .val-header.visible { opacity: 1; }
  .val-header .vh-ep { color: #1ca8ff; }

  /* ── Scenario rows ── */
  .sc-row {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-size: 11px;
    line-height: 1.8;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity .18s, transform .18s;
  }
  .sc-row.visible { opacity: 1; transform: none; }
  .sc-row .sc-icon { flex-shrink: 0; font-size: 10px; min-width: 12px; }
  .sc-row .sc-icon.ok  { color: #48b86c; }
  .sc-row .sc-icon.err { color: #f47067; }
  .sc-row .sc-code { color: #3a5a60; font-size: 10px; min-width: 28px; flex-shrink: 0; }
  .sc-row .sc-desc { color: #5a7a80; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sc-row.fail .sc-desc { color: #f47067; }

  /* ── Validation summary ── */
  .val-summary {
    font-size: 11px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity .3s;
  }
  .val-summary.visible { opacity: 1; }
  .val-summary.warn { color: #f47067; }
  .val-summary.ok { color: #48b86c; }

  /* ── Error / sees block ── */
  .err-block {
    font-size: 11px;
    line-height: 1.75;
  }
  .err-block .err-title { color: #f47067; font-weight: 600; margin-bottom: 4px; }
  .err-block .err-expected { color: #c0d0dc; }
  .err-block .err-loc { color: #4a6070; }
  .err-block .err-indent { color: #3a5060; padding-left: 10px; }
  .err-block .err-line {
    opacity: 0;
    transform: translateY(3px);
    transition: opacity .2s, transform .2s;
  }
  .err-block .err-line.visible { opacity: 1; transform: none; }

  /* ── Fix block ── */
  .fix-block {
    font-size: 11px;
    line-height: 1.7;
    color: #4a6070;
  }
  .fix-block .ln-add { color: #48b86c; }
  .fix-block .fix-ok {
    color: #48b86c;
    font-size: 10px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity .3s;
  }
  .fix-block .fix-ok.visible { opacity: 1; }

  /* ── PR block ── */
  .pr-block { font-size: 11px; line-height: 1.75; }
  .pr-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(72,184,108,.15);
    border: 1px solid rgba(72,184,108,.3);
    border-radius: 3px;
    padding: 1px 7px;
    font-size: 10px;
    color: #48b86c;
    font-weight: 600;
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity .2s;
  }
  .pr-badge.visible { opacity: 1; }
  .pr-title { color: #c0d0dc; font-weight: 600; margin-bottom: 6px; opacity: 0; transition: opacity .2s; font-size: 11px; }
  .pr-title.visible { opacity: 1; }
  .pr-meta { color: #4a6070; font-size: 10px; line-height: 1.8; opacity: 0; transition: opacity .2s; }
  .pr-meta.visible { opacity: 1; }
  .pr-checks { color: #48b86c; font-size: 10px; margin-top: 6px; opacity: 0; transition: opacity .2s; }
  .pr-checks.visible { opacity: 1; }

  /* ── SVG loop connector ── */
  .loop-svg-wrap {
    height: 44px;
    margin-top: 10px;
    display: none;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .loop-svg-wrap.visible {
    display: block;
    opacity: 1;
  }
  .loop-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .loop-path {
    fill: none;
    stroke: rgba(255, 255, 255, 0.35);
    stroke-width: 1.5;
    stroke-dasharray: 5 4;
    stroke-linecap: butt;
    stroke-linejoin: miter;
  }
  .loop-arrow {
    fill: rgba(255, 255, 255, 0.45);
    opacity: 0;
    transition: opacity .2s;
  }
  .loop-svg-wrap.visible .loop-arrow { opacity: 1; }
  .loop-label-text {
    fill: rgba(255, 255, 255, 0.3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-anchor: middle;
    font-weight: 600;
    opacity: 0;
    transition: opacity .4s .6s;
  }
  .loop-svg-wrap.visible .loop-label-text { opacity: 1; }

  /* ── Below desktop: vertical stack ── */
  @media (max-width: 1024px) {
    .kerno-loop-demo { height: auto; border-radius: 8px; }
    .loop-stage { padding: 16px 12px 16px; }
    .steps-row { flex-direction: column; }
    .step { flex: none; width: 100%; }
    .step-arrow {
      width: 100%; height: 18px; padding: 0;
      align-items: center; justify-content: center; font-size: 11px;
    }
    .step-arrow span { display: none; }
    .step-arrow::before { content: '↓'; }
    .step-card { height: 36px; transition: none; }
    .step.active .step-card,
    .step.done .step-card,
    .step.skipped .step-card { height: 220px; }
    #step1.active .step-card, #step1.done .step-card { height: 185px; }
    #step3.active .step-card, #step3.done .step-card { height: 180px; }
    #step4.active .step-card, #step4.done .step-card, #step4.skipped .step-card { height: 165px; }
    #step5.active .step-card, #step5.done .step-card { height: 175px; }
    .loop-svg-wrap { display: none !important; }
  }
</style>

<div class="kerno-loop-demo">
  <div class="loop-stage">
    <div class="steps-row" id="stepsRow">

      <!-- Step 1: Agent Writes -->
      <div class="step" id="step1">
        <div class="step-label">01 / Agent Writes Code</div>
        <div class="step-card">
          <div class="step-preview">
            <span class="step-preview-dot"></span>
            <span class="step-preview-text" id="prev1">api/users.ts</span>
          </div>
          <div class="step-body-inner">
            <div class="card-sep"></div>
            <div class="diff-block" id="diffBlock"></div>
          </div>
        </div>
      </div>

      <div class="step-arrow"><span>→</span></div>

      <!-- Step 2: Kerno Validates -->
      <div class="step" id="step2">
        <div class="step-label" id="label2">02 / Kerno · Validates</div>
        <div class="step-card">
          <div class="step-preview">
            <span class="step-preview-dot"></span>
            <span class="step-preview-text" id="prev2">runtime validation</span>
          </div>
          <div class="step-body-inner">
            <div class="card-sep"></div>
            <div id="valRows"></div>
            <div class="val-summary" id="valSummary"></div>
          </div>
        </div>
      </div>

      <div class="step-arrow"><span>→</span></div>

      <!-- Step 3: Agent Sees -->
      <div class="step" id="step3">
        <div class="step-label">03 / Agent Gets Feedback</div>
        <div class="step-card">
          <div class="step-preview">
            <span class="step-preview-dot"></span>
            <span class="step-preview-text" id="prev3">ContractDrift</span>
          </div>
          <div class="step-body-inner">
            <div class="card-sep"></div>
            <div class="err-block" id="errBlock"></div>
          </div>
        </div>
      </div>

      <div class="step-arrow"><span>→</span></div>

      <!-- Step 4: Agent Fixes -->
      <div class="step" id="step4">
        <div class="step-label">04 / Agent Fixes Code</div>
        <div class="step-card">
          <div class="step-preview">
            <span class="step-preview-dot"></span>
            <span class="step-preview-text" id="prev4">api/users.ts</span>
          </div>
          <div class="step-body-inner">
            <div class="card-sep"></div>
            <div class="fix-block" id="fixBlock"></div>
          </div>
        </div>
      </div>

      <div class="step-arrow"><span>→</span></div>

      <!-- Step 5: Opens PR -->
      <div class="step" id="step5">
        <div class="step-label">05 / You Open a PR</div>
        <div class="step-card">
          <div class="step-preview">
            <span class="step-preview-dot"></span>
            <span class="step-preview-text" id="prev5">#2418</span>
          </div>
          <div class="step-body-inner">
            <div class="card-sep"></div>
            <div class="pr-block" id="prBlock"></div>
          </div>
        </div>
      </div>

    </div><!-- /steps-row -->

    <!-- Loop SVG connector -->
    <div class="loop-svg-wrap" id="loopSvgWrap">
      <svg class="loop-svg" id="loopSvg" preserveAspectRatio="none">
        <path id="loopPath" class="loop-path"/>
        <polygon id="loopArrow" class="loop-arrow" points="0,0 0,0 0,0"/>
        <text id="loopLabelText" class="loop-label-text" y="44">— VALIDATION LOOP —</text>
      </svg>
    </div>

  </div><!-- /loop-stage -->
</div>

<script>
(function(){
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function getEl(id){ return document.getElementById(id); }

  // ── Step activation helpers ──
  function activateStep(n){
    const el = getEl('step'+n);
    el.classList.remove('done','done-ok','done-warn','done-err');
    el.classList.add('active');
  }
  function deactivateStep(n, doneClass){
    const el = getEl('step'+n);
    el.classList.remove('active');
    if(doneClass) el.classList.add('done', doneClass);
  }
  function resetStep(n){
    const el = getEl('step'+n);
    el.classList.remove('active','done','done-ok','done-warn','done-err','skipped');
  }
  function skipStep(n){
    const el = getEl('step'+n);
    el.classList.remove('active','done','done-ok','done-warn','done-err');
    el.classList.add('skipped');
  }

  // ── Fade-in helper ──
  async function fadeIn(el, delay){
    if(delay) await sleep(delay);
    el.classList.add('visible');
  }

  // ──────────────────────────────────────────
  // STEP 1: Agent Writes
  // ──────────────────────────────────────────
  async function runStep1(){
    activateStep(1);
    const db = getEl('diffBlock');
    db.innerHTML = '';
    await sleep(160);

    const lines = [
      { num:'42', text:' - return users', cls:'ln-rem' },
      { num:'43', text:' + const off = +req.query.offset', cls:'ln-add' },
      { num:'44', text:' + return users', cls:'ln-add' },
      { num:'45', text:' + .slice(off, off+20)', cls:'ln-add' },
    ];

    for(const l of lines){
      const row = document.createElement('div');
      row.innerHTML = `<span class="ln-num">${l.num}</span>`;
      const txt = document.createElement('span');
      txt.className = l.cls;
      row.appendChild(txt);
      db.appendChild(row);
      for(let i = 0; i < l.text.length; i++){
        txt.textContent += l.text[i];
        await sleep(28 + Math.random()*18);
      }
      await sleep(60);
    }

    await sleep(300);
    const stat = document.createElement('div');
    stat.className = 'diff-stat';
    stat.innerHTML = 'diff +3 -1 · <span class="staged">staged</span>';
    db.appendChild(stat);
    await sleep(600);

    getEl('prev1').textContent = 'diff +3 -1 · staged';
    deactivateStep(1, 'done-ok');
  }

  // ──────────────────────────────────────────
  // STEP 2: Kerno Validates (isCleanPass=false → finds diff; true → clean)
  // ──────────────────────────────────────────
  async function runStep2(isCleanPass){
    const valRows   = getEl('valRows');
    const valSummary = getEl('valSummary');
    valRows.innerHTML = '';
    valSummary.className = 'val-summary';
    valSummary.textContent = '';

    const label2 = getEl('label2');
    label2.textContent = isCleanPass ? '02 / Kerno · Re-validates' : '02 / Kerno · Validates';

    activateStep(2);
    getEl('step2').classList.add('validating');
    await sleep(160);

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'val-header';
    hdr.innerHTML = `Running 5 scenarios · <span class="vh-ep">GET /api/users</span>`;
    valRows.appendChild(hdr);
    await sleep(40);
    hdr.classList.add('visible');
    await sleep(350);

    const scenarios = [
      { ok: true,         code:'200', desc:'Returns paginated user list'        },
      { ok: true,         code:'200', desc:'Empty result set returns []'         },
      { ok: isCleanPass,  code:'200', desc:"Response includes X-Total-Count",    isFail: !isCleanPass },
      { ok: true,         code:'400', desc:'Invalid page param returns 400'      },
      { ok: true,         code:'401', desc:'Missing token returns 401'           },
    ];

    for(const s of scenarios){
      const row = document.createElement('div');
      row.className = 'sc-row' + (s.isFail ? ' fail' : '');
      row.innerHTML = `<span class="sc-icon ${s.ok?'ok':'err'}">${s.ok?'✓':'✗'}</span><span class="sc-code">${s.code}</span><span class="sc-desc">${s.desc}</span>`;
      valRows.appendChild(row);
      await sleep(30);
      row.classList.add('visible');
      await sleep(s.isFail ? 350 : 420);
    }

    await sleep(300);

    getEl('step2').classList.remove('validating');

    if(!isCleanPass){
      valSummary.innerHTML = '1 diff detected';
      valSummary.className = 'val-summary warn visible';
      await sleep(700);

      getEl('prev2').textContent = '1 diff detected';
      deactivateStep(2, 'done-warn');
    } else {
      valSummary.innerHTML = '✓ No diffs detected';
      valSummary.className = 'val-summary ok visible';
      await sleep(700);

      getEl('prev2').textContent = '✓ validated';
      deactivateStep(2, 'done-ok');
    }
  }

  // ──────────────────────────────────────────
  // STEP 3: Agent Sees
  // ──────────────────────────────────────────
  async function runStep3(isCleanPass){
    activateStep(3);
    const eb = getEl('errBlock');
    eb.innerHTML = '';
    await sleep(160);

    if(isCleanPass){
      const lines = [
        { text:'✓ All scenarios pass', cls:'err-title', color:'#48b86c' },
        { text:'X-Total-Count present', cls:'err-expected', color:'#48b86c' },
        { text:'Response shape correct', cls:'err-loc' },
        { text:'Baseline matches', cls:'err-loc' },
      ];
      for(const l of lines){
        const el = document.createElement('div');
        el.className = l.cls + ' err-line';
        if(l.color) el.style.color = l.color;
        el.textContent = l.text;
        eb.appendChild(el);
        await sleep(60);
        el.classList.add('visible');
        await sleep(300);
      }
      await sleep(400);
      getEl('prev3').textContent = '✓ all good';
      deactivateStep(3, 'done-ok');
    } else {
      const lines = [
        { text:'ContractDrift', cls:'err-title' },
        { text:"expected 'X-Total-Count'", cls:'err-expected' },
        { text:'  at api/users.ts:44', cls:'err-loc' },
        { text:'  └ paginated response', cls:'err-indent' },
        { text:'    total not exposed', cls:'err-indent' },
      ];
      for(const l of lines){
        const el = document.createElement('div');
        el.className = l.cls + ' err-line';
        el.textContent = l.text;
        eb.appendChild(el);
        await sleep(80);
        el.classList.add('visible');
        await sleep(260);
      }
      await sleep(600);
      getEl('prev3').textContent = 'ContractDrift';
      deactivateStep(3, 'done-err');
    }
  }

  // ──────────────────────────────────────────
  // STEP 4: Agent Fixes
  // ──────────────────────────────────────────
  async function runStep4(){
    activateStep(4);
    const fb = getEl('fixBlock');
    fb.innerHTML = '';
    await sleep(160);

    const fixLines = [
      "+ res.set(",
      "+ 'X-Total-Count',",
      "+ users.length)",
    ];

    for(const t of fixLines){
      const row = document.createElement('div');
      const span = document.createElement('span');
      span.className = 'ln-add';
      row.appendChild(span);
      fb.appendChild(row);
      for(let i = 0; i < t.length; i++){
        span.textContent += t[i];
        await sleep(32 + Math.random()*22);
      }
      await sleep(80);
    }

    await sleep(350);
    const ok = document.createElement('div');
    ok.className = 'fix-ok';
    ok.textContent = 'header added ✓';
    fb.appendChild(ok);
    await sleep(60);
    ok.classList.add('visible');
    await sleep(600);

    getEl('prev4').textContent = 'header added ✓';
    deactivateStep(4, 'done-ok');
  }

  // ──────────────────────────────────────────
  // STEP 4 SKIP: Nothing to fix
  // ──────────────────────────────────────────
  async function skipStep4(){
    const fb = getEl('fixBlock');
    fb.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'skip-msg';
    msg.textContent = 'Nothing to fix';
    fb.appendChild(msg);
    getEl('prev4').textContent = 'nothing to fix';
    skipStep(4);
    await sleep(600);
  }

  // ──────────────────────────────────────────
  // STEP 5: Opens PR
  // ──────────────────────────────────────────
  async function runStep5(){
    activateStep(5);
    const pb = getEl('prBlock');
    pb.innerHTML = `
      <div class="pr-badge" id="prBadge">● open  #2418</div>
      <div class="pr-title" id="prTitle">feat: paginate GET /api/users</div>
      <div class="pr-meta" id="prMeta">agent/paginate → main<br>a7f2c91 · 1 file · +5 −1</div>
      <div class="pr-checks" id="prChecks">● all checks passed</div>
    `;
    await sleep(160);
    await fadeIn(getEl('prBadge'));
    await sleep(350);
    await fadeIn(getEl('prTitle'));
    await sleep(350);
    await fadeIn(getEl('prMeta'));
    await sleep(500);
    await fadeIn(getEl('prChecks'));
    await sleep(700);

    getEl('prev5').textContent = '✓ all checks passed';
    deactivateStep(5, 'done-ok');
  }

  // ──────────────────────────────────────────
  // LOOP LINE
  // ──────────────────────────────────────────
  function buildLoopPath(){
    const wrap    = getEl('loopSvgWrap');
    const s2      = getEl('step2');
    const s4      = getEl('step4');
    const wrapRect = wrap.getBoundingClientRect();
    const s2Rect   = s2.getBoundingClientRect();
    const s4Rect   = s4.getBoundingClientRect();

    const x4 = s4Rect.left + s4Rect.width * 0.5 - wrapRect.left;
    const x2 = s2Rect.left + s2Rect.width * 0.5 - wrapRect.left;
    const yTop    = 2;
    const yBottom = 30;
    const xMid    = (x2 + x4) / 2;
    const aw = 5, ah = 8;

    // Path ends at arrow base (yTop + ah) so the line doesn't overlap the arrowhead
    const d = `M ${x4} ${yTop} L ${x4} ${yBottom} L ${x2} ${yBottom} L ${x2} ${yTop + ah}`;

    // Upward-pointing arrowhead — tip above yTop, base at yTop + ah
    const arrow = `${x2-aw},${yTop+ah} ${x2},${yTop-2} ${x2+aw},${yTop+ah}`;

    return { d, xMid, arrow };
  }

  async function drawLoopLine(){
    const wrap      = getEl('loopSvgWrap');
    const path      = getEl('loopPath');
    const arrowEl   = getEl('loopArrow');
    const labelText = getEl('loopLabelText');
    const svg       = wrap.querySelector('svg');

    // Show invisibly so getBoundingClientRect returns real coords
    wrap.style.opacity = '0';
    wrap.style.display = 'block';
    await sleep(50);

    const { d, xMid, arrow } = buildLoopPath();
    path.setAttribute('d', d);
    arrowEl.setAttribute('points', arrow);
    labelText.setAttribute('x', xMid);

    // clip-path starts fully clipped from the left (nothing visible)
    // then animates to 0 → reveals right-to-left regardless of path direction
    svg.style.transition = 'none';
    svg.style.clipPath = 'inset(0 0 0 100%)';

    wrap.classList.add('visible');
    wrap.style.opacity = '';
    await sleep(30);

    svg.style.transition = 'clip-path 900ms linear';
    svg.style.clipPath = 'inset(0 0 0 0%)';
    await sleep(950);
  }

  async function hideLoopLine(){
    const wrap = getEl('loopSvgWrap');
    if(!wrap.classList.contains('visible') && wrap.style.display !== 'block') return;
    const svg = wrap.querySelector('svg');
    wrap.style.opacity = '0';
    await sleep(350);
    wrap.classList.remove('visible');
    wrap.style.opacity = '';
    wrap.style.display = '';
    // Reset clip for next draw
    svg.style.transition = 'none';
    svg.style.clipPath = '';
  }

  // ──────────────────────────────────────────
  // RESET all steps to initial state
  // ──────────────────────────────────────────
  function resetAll(){
    for(let n = 1; n <= 5; n++) resetStep(n);

    // Reset preview texts
    getEl('prev1').textContent = 'api/users.ts';
    getEl('prev2').textContent = 'runtime validation';
    getEl('prev3').textContent = 'ContractDrift';
    getEl('prev4').textContent = 'api/users.ts';
    getEl('prev5').textContent = '#2418';

    // Reset step2 label
    getEl('label2').textContent = '02 / Kerno · Validates';

    // Clear inner content
    getEl('diffBlock').innerHTML = '';
    getEl('valRows').innerHTML = '';
    const vs = getEl('valSummary');
    vs.className = 'val-summary';
    vs.textContent = '';
    getEl('errBlock').innerHTML = '';
    getEl('fixBlock').innerHTML = '';
    getEl('prBlock').innerHTML = '';
  }

  // ──────────────────────────────────────────
  // MAIN RUN LOOP
  // ──────────────────────────────────────────
  let running = false;

  async function run(){
    if(running) return;
    running = true;

    while(true){
      resetAll();
      await hideLoopLine();
      await sleep(400);

      // Step 1: Agent writes
      await runStep1();
      await sleep(300);

      // Step 2: Kerno validates — finds diff
      await runStep2(false);
      await sleep(300);

      // Step 3: Agent sees — ContractDrift
      await runStep3(false);
      await sleep(300);

      // Step 4: Agent fixes
      await runStep4();
      await sleep(400);

      // Loop line draws from step 4 back to step 2
      await drawLoopLine();
      await sleep(400);

      // Step 2: Re-validates — clean
      await runStep2(true);
      await sleep(300);

      // Step 3: Agent sees — all good
      await runStep3(true);
      await sleep(300);

      // Step 4: Skipped — nothing to fix
      await skipStep4();
      await sleep(300);

      // Step 5: Opens PR
      await runStep5();

      // Pause 3s showing all results
      await sleep(3000);

      // Fade out loop line before restart
      await hideLoopLine();
      await sleep(300);
    }
  }

  // Cmd/Ctrl+R restarts
  document.addEventListener('keydown', function(e){
    if((e.metaKey || e.ctrlKey) && e.key === 'r'){
      e.preventDefault();
      running = false;
      run();
    }
  });

  // Start
  run();
})();
</script>
