<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; background: #151515; min-height: 100vh; }
.tcs {
  background: #1a1a1a;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  width: 100%; margin: 0;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; overflow: hidden;
  box-sizing: border-box;
  padding: 28px 32px 32px;
}
.tcs * { box-sizing: border-box; }
.tcs-title {
  font-size: 16px; font-weight: 700; color: #ffffff;
  margin: 0 0 8px;
}
.tcs-subtitle {
  font-size: 11px; color: rgba(255,255,255,0.45);
  margin: 0 0 20px; line-height: 1.5;
}
.tcs-legend {
  display: flex; gap: 20px; margin-bottom: 28px;
}
.tcs-legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: rgba(255,255,255,0.65);
}
.tcs-swatch {
  width: 10px; height: 10px; border-radius: 2px;
}
.tcs-swatch.kerno { background: #ff4df0; }
.tcs-swatch.base { background: rgba(255,255,255,0.22); }
.tcs-rows {
  display: flex; flex-direction: column; gap: 28px;
}
.tcs-row {
  display: grid; grid-template-columns: 150px 1fr; align-items: start; gap: 16px;
}
.tcs-label-name {
  font-size: 13px; font-weight: 600; color: #ffffff;
  margin: 0 0 2px;
}
.tcs-label-meta {
  font-size: 10px; color: rgba(255,255,255,0.35);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.tcs-bars {
  display: flex; flex-direction: column; gap: 6px;
}
.tcs-bar-row {
  display: flex; align-items: center; gap: 10px;
}
.tcs-bar-wrap {
  position: relative; flex: 1; height: 22px;
  background: transparent; border-radius: 4px;
  overflow: visible;
}
.tcs-bar {
  height: 100%; border-radius: 4px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  min-width: 2px;
}
.tcs-bar.kerno { background: #ff4df0; }
.tcs-bar.base { background: rgba(255,255,255,0.15); }
.tcs-bar-val {
  font-size: 11px; font-weight: 600; color: #ffffff;
  white-space: nowrap; flex-shrink: 0;
}
.tcs-bar.base .tcs-bar-val {
  color: rgba(255,255,255,0.65);
}
@media (max-width: 768px) {
  .tcs { padding: 20px 20px 24px; }
  .tcs-row { grid-template-columns: 120px 1fr; gap: 12px; }
  .tcs-label-name { font-size: 12px; }
}
@media (max-width: 480px) {
  .tcs { padding: 16px 16px 20px; }
  .tcs-title { font-size: 14px; }
  .tcs-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>

<div class="tcs">
  <div class="tcs-title">Tool calls per session</div>
  <div class="tcs-subtitle">Every call avoided is a file read, grep, or shell execution that no longer consumes context.</div>
  <div class="tcs-legend">
    <div class="tcs-legend-item"><div class="tcs-swatch kerno"></div> Kerno-augmented</div>
    <div class="tcs-legend-item"><div class="tcs-swatch base"></div> Baseline</div>
  </div>
  <div class="tcs-rows">
    <div class="tcs-row">
      <div>
        <div class="tcs-label-name">Docmost</div>
        <div class="tcs-label-meta">Medium TS</div>
      </div>
      <div class="tcs-bars">
        <div class="tcs-bar-row">
          <div class="tcs-bar-wrap"><div class="tcs-bar kerno" style="width: 12.6%"><span class="tcs-bar-val">24</span></div></div>
        </div>
        <div class="tcs-bar-row">
          <div class="tcs-bar-wrap"><div class="tcs-bar base" style="width: 100%"><span class="tcs-bar-val">190 calls · 87% fewer</span></div></div>
        </div>
      </div>
    </div>
    <div class="tcs-row">
      <div>
        <div class="tcs-label-name">Keep</div>
        <div class="tcs-label-meta">Medium PY</div>
      </div>
      <div class="tcs-bars">
        <div class="tcs-bar-row">
          <div class="tcs-bar kerno" style="width: 2.6%; display: inline-block; height: 22px; flex-shrink: 0;"></div>
          <span class="tcs-bar-val">5</span>
        </div>
        <div class="tcs-bar-row">
          <div class="tcs-bar-wrap"><div class="tcs-bar base" style="width: 37.4%"><span class="tcs-bar-val">71 calls · 92% fewer</span></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
