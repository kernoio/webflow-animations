<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; background: #151515; min-height: 100vh; }
.alat {
  background: #1a1a1a;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  width: 100%; margin: 0;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; overflow: hidden;
  box-sizing: border-box;
  padding: 28px 32px 32px;
}
.alat * { box-sizing: border-box; }
.alat-title {
  font-size: 16px; font-weight: 700; color: #ffffff;
  margin: 0 0 8px;
}
.alat-subtitle {
  font-size: 11px; color: rgba(255,255,255,0.45);
  margin: 0 0 20px; line-height: 1.5;
}
.alat-legend {
  display: flex; gap: 20px; margin-bottom: 28px;
}
.alat-legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: rgba(255,255,255,0.65);
}
.alat-swatch {
  width: 10px; height: 10px; border-radius: 2px;
}
.alat-swatch.kerno { background: #ff4df0; }
.alat-swatch.base { background: rgba(255,255,255,0.22); }
.alat-rows {
  display: flex; flex-direction: column; gap: 28px;
}
.alat-row {
  display: grid; grid-template-columns: 150px 1fr; align-items: start; gap: 16px;
}
.alat-label-name {
  font-size: 13px; font-weight: 600; color: #ffffff;
  margin: 0 0 2px;
}
.alat-label-meta {
  font-size: 10px; color: rgba(255,255,255,0.35);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.alat-bars {
  display: flex; flex-direction: column; gap: 6px;
}
.alat-bar-row {
  display: flex; align-items: center; gap: 10px;
}
.alat-bar-wrap {
  position: relative; flex: 1; height: 22px;
  background: transparent; border-radius: 4px;
  overflow: visible;
}
.alat-bar {
  height: 100%; border-radius: 4px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  min-width: 2px;
}
.alat-bar.kerno { background: #ff4df0; }
.alat-bar.base { background: rgba(255,255,255,0.15); }
.alat-bar-val {
  font-size: 11px; font-weight: 600; color: #ffffff;
  white-space: nowrap; flex-shrink: 0;
}
.alat-bar.base .alat-bar-val {
  color: rgba(255,255,255,0.65);
}
@media (max-width: 768px) {
  .alat { padding: 20px 20px 24px; }
  .alat-row { grid-template-columns: 120px 1fr; gap: 12px; }
  .alat-label-name { font-size: 12px; }
}
@media (max-width: 480px) {
  .alat { padding: 16px 16px 20px; }
  .alat-title { font-size: 14px; }
  .alat-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>

<div class="alat">
  <div class="alat-title">Average latency per prompt — small & medium codebases</div>
  <div class="alat-subtitle">Seconds. Lower is better. Large codebases are a deliberate trade-off (see below).</div>
  <div class="alat-legend">
    <div class="alat-legend-item"><div class="alat-swatch kerno"></div> Kerno-augmented</div>
    <div class="alat-legend-item"><div class="alat-swatch base"></div> Baseline</div>
  </div>
  <div class="alat-rows">
    <div class="alat-row">
      <div>
        <div class="alat-label-name">Example-TS</div>
        <div class="alat-label-meta">Small TS</div>
      </div>
      <div class="alat-bars">
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar kerno" style="width: 25.6%"><span class="alat-bar-val">24.2s</span></div></div>
        </div>
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar base" style="width: 43.9%"><span class="alat-bar-val">41.5s</span></div></div>
        </div>
      </div>
    </div>
    <div class="alat-row">
      <div>
        <div class="alat-label-name">Docmost</div>
        <div class="alat-label-meta">Medium TS</div>
      </div>
      <div class="alat-bars">
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar kerno" style="width: 33.8%"><span class="alat-bar-val">31.9s</span></div></div>
        </div>
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar base" style="width: 100%"><span class="alat-bar-val">94.5s</span></div></div>
        </div>
      </div>
    </div>
    <div class="alat-row">
      <div>
        <div class="alat-label-name">Example-PY</div>
        <div class="alat-label-meta">Small PY</div>
      </div>
      <div class="alat-bars">
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar kerno" style="width: 16.2%"><span class="alat-bar-val">15.3s</span></div></div>
        </div>
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar base" style="width: 13.4%"><span class="alat-bar-val">12.7s</span></div></div>
        </div>
      </div>
    </div>
    <div class="alat-row">
      <div>
        <div class="alat-label-name">Keep</div>
        <div class="alat-label-meta">Medium PY</div>
      </div>
      <div class="alat-bars">
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar kerno" style="width: 22%"><span class="alat-bar-val">20.8s</span></div></div>
        </div>
        <div class="alat-bar-row">
          <div class="alat-bar-wrap"><div class="alat-bar base" style="width: 39.4%"><span class="alat-bar-val">37.2s</span></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
