<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; background: #151515; min-height: 100vh; }
.lt {
  background: #151515;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  width: 100%; margin: 0;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; overflow: hidden;
  box-sizing: border-box;
}
.lt * { box-sizing: border-box; }
.lt-table {
  width: 100%;
  border-collapse: collapse;
}
.lt-table thead th {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: #ffffff; font-weight: 600;
  text-align: left; padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}
.lt-table tbody td.kerno { background: rgba(255,77,240,0.06); color: #ffffff; }
.lt-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.lt-table tbody tr:last-child { border-bottom: none; }
.lt-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.lt-table tbody td {
  padding: 14px 16px; font-size: 12px;
  color: rgba(255,255,255,0.5); vertical-align: middle;
}
.lt-table tbody td.delta-val {
  color: #ffffff; font-weight: 700;
}
@media (max-width: 768px) {
  .lt { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .lt-table { min-width: 720px; }
  .lt-table thead th { padding: 12px 14px; font-size: 9px; }
  .lt-table tbody td { padding: 12px 14px; font-size: 11px; }
}
</style>

<div class="lt">
  <table class="lt-table">
    <thead>
      <tr>
        <th>Codebase</th>
        <th>Kerno tok</th>
        <th>Kerno lat</th>
        <th>Base tok</th>
        <th>Base tools</th>
        <th>Base lat</th>
        <th>&#916; Tok</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Small</td>
        <td class="kerno">3,120</td>
        <td class="kerno">60s</td>
        <td>~31,000</td>
        <td>14</td>
        <td>48s</td>
        <td class="delta-val">-89.9%</td>
      </tr>
      <tr>
        <td>Medium</td>
        <td class="kerno">3,000</td>
        <td class="kerno">28s</td>
        <td>~31,600</td>
        <td>25</td>
        <td>65s</td>
        <td class="delta-val">-90.5%</td>
      </tr>
      <tr>
        <td>Large</td>
        <td class="kerno">~776</td>
        <td class="kerno">50s</td>
        <td>~62,000</td>
        <td>44</td>
        <td>104s</td>
        <td class="delta-val">-98.7%</td>
      </tr>
    </tbody>
  </table>
</div>
