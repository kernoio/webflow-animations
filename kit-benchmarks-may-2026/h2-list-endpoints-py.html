<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; background: #151515; min-height: 100vh; }
.lt {
  background: #151515;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  width: 100%; margin: 0;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; overflow: hidden;
  box-sizing: border-box;
}
.lt * { box-sizing: border-box; }
.lt-table {
  width: 100%;
  border-collapse: collapse;
}
.lt-table thead th {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: #ffffff; font-weight: 600;
  text-align: left; padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}
.lt-table tbody td.kerno { background: rgba(255,77,240,0.06); color: #ffffff; }
.lt-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.lt-table tbody tr:last-child { border-bottom: none; }
.lt-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.lt-table tbody td {
  padding: 14px 16px; font-size: 12px;
  color: rgba(255,255,255,0.5); vertical-align: middle;
}
.lt-table tbody td.delta {
  color: rgba(255,255,255,0.35); font-style: italic;
}
.lt-table tbody td.delta-val {
  color: #ffffff; font-weight: 700;
}
.lt-name { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.75); }
.lt-size {
  display: inline-block; font-size: 9px; padding: 2px 7px;
  border-radius: 3px; font-weight: 400;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
}
@media (max-width: 768px) {
  .lt { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .lt-table { min-width: 720px; }
  .lt-table thead th { padding: 12px 14px; font-size: 9px; }
  .lt-table tbody td { padding: 12px 14px; font-size: 11px; }
}
</style>

<div class="lt">
  <table class="lt-table">
    <thead>
      <tr>
        <th>Codebase</th>
        <th>Kerno tok</th>
        <th>Kerno t</th>
        <th>Base tok</th>
        <th>Base tools</th>
        <th>Base t</th>
        <th>Saving</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="lt-name">Example-PY <span class="lt-size">Small</span></span></td>
        <td class="kerno">1,759</td>
        <td class="kerno">21s</td>
        <td>1,000</td>
        <td>1</td>
        <td>11s</td>
        <td class="delta">N/A (base faster)</td>
      </tr>
      <tr>
        <td><span class="lt-name">Keep <span class="lt-size">Medium</span></span></td>
        <td class="kerno">0</td>
        <td class="kerno">28s</td>
        <td>107,000</td>
        <td>47</td>
        <td>91s</td>
        <td class="delta-val">-100%</td>
      </tr>
      <tr>
        <td><span class="lt-name">Airflow <span class="lt-size">Large</span></span></td>
        <td class="kerno">15,300</td>
        <td class="kerno">180s</td>
        <td>120,000</td>
        <td>24</td>
        <td>45s</td>
        <td class="delta-val">-87.3%</td>
      </tr>
    </tbody>
  </table>
</div>
