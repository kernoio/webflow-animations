<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; background: #151515; min-height: 100vh; }
.ait {
  background: #1a1a1a;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  width: 100%; margin: 0;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; overflow: hidden;
  box-sizing: border-box;
  padding: 28px 32px 32px;
}
.ait * { box-sizing: border-box; }
.ait-title {
  font-size: 16px; font-weight: 700; color: #ffffff;
  margin: 0 0 8px;
}
.ait-subtitle {
  font-size: 11px; color: rgba(255,255,255,0.45);
  margin: 0 0 20px; line-height: 1.5;
}
.ait-legend {
  display: flex; gap: 20px; margin-bottom: 28px;
}
.ait-legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: rgba(255,255,255,0.65);
}
.ait-swatch {
  width: 10px; height: 10px; border-radius: 2px;
}
.ait-swatch.kerno { background: #ff4df0; }
.ait-swatch.base { background: rgba(255,255,255,0.22); }
.ait-rows {
  display: flex; flex-direction: column; gap: 28px;
}
.ait-row {
  display: grid; grid-template-columns: 150px 1fr; align-items: start; gap: 16px;
}
.ait-label-name {
  font-size: 13px; font-weight: 600; color: #ffffff;
  margin: 0 0 2px;
}
.ait-label-meta {
  font-size: 10px; color: rgba(255,255,255,0.35);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.ait-bars {
  display: flex; flex-direction: column; gap: 6px;
}
.ait-bar-row {
  display: flex; align-items: center; gap: 10px;
}
.ait-bar-wrap {
  position: relative; flex: 1; height: 22px;
  background: transparent; border-radius: 4px;
  overflow: visible;
}
.ait-bar {
  height: 100%; border-radius: 4px;
  min-width: 2px;
}
.ait-bar.kerno { background: #ff4df0; }
.ait-bar.base { background: rgba(255,255,255,0.15); }
.ait-bar-val {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65);
  white-space: nowrap; flex-shrink: 0;
}
@media (max-width: 768px) {
  .ait { padding: 20px 20px 24px; }
  .ait-row { grid-template-columns: 120px 1fr; gap: 12px; }
  .ait-label-name { font-size: 12px; }
}
@media (max-width: 480px) {
  .ait { padding: 16px 16px 20px; }
  .ait-title { font-size: 14px; }
  .ait-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>

<div class="ait">
  <div class="ait-title">Absolute input tokens — the same query, two conditions</div>
  <div class="ait-subtitle">Representative session. Lower is better. Note how small the Kerno bars are.</div>
  <div class="ait-legend">
    <div class="ait-legend-item"><div class="ait-swatch kerno"></div> Kerno-augmented</div>
    <div class="ait-legend-item"><div class="ait-swatch base"></div> Baseline</div>
  </div>
  <div class="ait-rows">
    <div class="ait-row">
      <div>
        <div class="ait-label-name">Docmost</div>
        <div class="ait-label-meta">Medium TS</div>
      </div>
      <div class="ait-bars">
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar kerno" style="width: 2%"></div></div>
          <span class="ait-bar-val">6,708</span>
        </div>
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar base" style="width: 71.5%"></div></div>
          <span class="ait-bar-val">~236,000</span>
        </div>
      </div>
    </div>
    <div class="ait-row">
      <div>
        <div class="ait-label-name">Keep</div>
        <div class="ait-label-meta">Medium PY</div>
      </div>
      <div class="ait-bars">
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar kerno" style="width: 0.7%"></div></div>
          <span class="ait-bar-val">2,200</span>
        </div>
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar base" style="width: 62.4%"></div></div>
          <span class="ait-bar-val">~205,800</span>
        </div>
      </div>
    </div>
    <div class="ait-row">
      <div>
        <div class="ait-label-name">Airflow</div>
        <div class="ait-label-meta">Large PY</div>
      </div>
      <div class="ait-bars">
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar kerno" style="width: 7.7%"></div></div>
          <span class="ait-bar-val">25,300</span>
        </div>
        <div class="ait-bar-row">
          <div class="ait-bar-wrap"><div class="ait-bar base" style="width: 100%"></div></div>
          <span class="ait-bar-val">~330,000</span>
        </div>
      </div>
    </div>
  </div>
</div>
